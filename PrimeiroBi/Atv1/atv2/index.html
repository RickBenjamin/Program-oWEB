<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="/register">
        <fieldset>
            <legend><b>Crie sua Conta</b></legend>

            <label for="name">Nome</label>
            <input type="text" name="name" id="name"><br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required><br>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" required><br><br>

            <b>Gênero:</b><br>
            <input type="radio" name="genero" id="msc">
            <label for="msc">Masculino</label><br>

            <input type="radio" name="genero" id="fem">
            <label for="fem">Feminino</label><br>

            <input type="radio" name="genero" id="outro">
            <label for="outro">Outro</label><br>

            <b>Biografia:</b><br>
            <textarea name="Biografia" placeholder="Conte um pouco sobre você"></textarea><br><br><br><br>


            <input type="checkbox" required>
            <label for="">Eu li e aceito os termos de uso</label>
        </fieldset>
        
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
