<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de cadastro:</title>
</head>
<body>
    <form action="/register">
        <fieldset>
            <legend><b>Crie sua Conta</b></legend>

            <label for="name">Nome:</label><br>
            <input type="text" name="name" id="name"><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email" required placeholder="seuEmail@dominio.com"><br><br>

            <label for="senha">Senha:(mínimo 8 caracteres):</label><br>
            <input type="password" name="senha" id="senha" required><br><br>

            <b>Gênero:</b><br><br>
            <input type="radio" name="genero" id="msc">
            <label for="msc">Masculino</label><br>

            <input type="radio" name="genero" id="fem">
            <label for="fem">Feminino</label><br>

            <input type="radio" name="genero" id="outro">
            <label for="outro">Outro</label><br><br>

            <b>Biografia:</b><br>
            <textarea name="Biografia" rows="5" placeholder="Conte um pouco sobre você.."></textarea><br><br>


            <input type="checkbox" required>
            <label for="">Eu li e aceito os termos de serviço.</label>
        </fieldset>
        
        <br>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
